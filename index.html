<!DOCTYPE html>

<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #1e1e2e; --border2: #2a2a3e;
    --text: #e8e8f0; --muted: #5a5a7a; --accent: #7c6af7; --accent2: #5b4fd4;
    --good: #22c55e; --warn: #f59e0b; --bad: #ef4444;
    --good-bg: rgba(34,197,94,0.08); --warn-bg: rgba(245,158,11,0.08); --bad-bg: rgba(239,68,68,0.08);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 70% 20%, rgba(124,106,247,0.07) 0%, transparent 60%), radial-gradient(ellipse 40% 50% at 10% 80%, rgba(34,197,94,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .container { max-width: 640px; margin: 0 auto; position: relative; z-index: 1; }
  header { margin-bottom: 1.8rem; }
  .eyebrow { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; }
  h1 { font-size: 2rem; font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #e8e8f0 30%, #7c6af7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tab-bar { display: flex; gap: 0.4rem; margin-bottom: 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.3rem; }
  .tab { flex: 1; padding: 0.55rem; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em; }
  .tab.active { background: var(--accent); color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.3rem; margin-bottom: 1rem; }
  .section-card h2 { font-size: 0.72rem; font-family: 'Space Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.45rem; margin-bottom: 1rem; }
  .line-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.7rem; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: left; }
  .line-btn.selected { border-color: var(--line-color, var(--accent)); background: color-mix(in srgb, var(--line-color, var(--accent)) 12%, transparent); color: var(--text); }
  .line-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .search-row { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; }
  .search-input { flex: 1; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 9px; padding: 0.65rem 0.9rem; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-results { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; margin-bottom: 0.8rem; display: none; }
  .search-results.show { display: block; }
  .search-result-item { padding: 0.65rem 0.9rem; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--border); }
  .search-result-item .result-line { font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem; font-family: 'Space Mono', monospace; }
  .saved-stations { display: flex; flex-direction: column; gap: 0.4rem; }
  .saved-station { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border2); border-radius: 9px; padding: 0.6rem 0.8rem; }
  .saved-station-name { font-size: 0.85rem; font-weight: 600; }
  .saved-station-lines { font-size: 0.68rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 0.1rem; }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem; line-height: 1; transition: color 0.12s; }
  .remove-btn:hover { color: var(--bad); }
  .empty-stations { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 1rem; }
  .time-windows { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
  .time-window-row { display: flex; align-items: center; gap: 0.5rem; }
  .time-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; width: 28px; flex-shrink: 0; }
  .time-picker { display: flex; align-items: center; gap: 0.3rem; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 9px; padding: 0.5rem 0.7rem; }
  .time-picker select { background: transparent; border: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; }
  .time-picker select option { background: #1a1a26; }
  .time-sep { font-family: 'Space Mono', monospace; color: var(--muted); font-size: 0.9rem; }
  .time-arrow { color: var(--muted); font-size: 0.8rem; flex-shrink: 0; }
  .add-time-btn { display: flex; align-items: center; gap: 0.4rem; background: none; border: 1.5px dashed var(--border2); border-radius: 9px; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 600; padding: 0.55rem 0.9rem; cursor: pointer; width: 100%; justify-content: center; transition: all 0.15s; }
  .add-time-btn:hover { border-color: var(--accent); color: var(--accent); }
  .remove-time-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0.2rem; line-height: 1; flex-shrink: 0; transition: color 0.12s; margin-left: auto; }
  .remove-time-btn:hover { color: var(--bad); }
  .notif-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .notif-row span { font-size: 0.88rem; }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border2); border-radius: 24px; cursor: pointer; transition: background 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
  .notif-note { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
  .check-btn { width: 100%; padding: 0.85rem; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.12s; margin-top: 0.2rem; }
  .check-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .check-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .results-section { margin-top: 1rem; }
  .results-header { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
  .results { display: flex; flex-direction: column; gap: 0.6rem; }
  .status-card { border-radius: 14px; border: 1px solid var(--border); padding: 1rem 1.2rem; display: flex; align-items: flex-start; gap: 0.9rem; animation: slideIn 0.28s ease both; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .status-card.good  { background: var(--good-bg); border-color: rgba(34,197,94,0.2); }
  .status-card.minor { background: var(--warn-bg); border-color: rgba(245,158,11,0.25); }
  .status-card.bad   { background: var(--bad-bg);  border-color: rgba(239,68,68,0.25); }
  .card-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; min-height: 28px; }
  .card-body { flex: 1; min-width: 0; }
  .card-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.2rem; flex-wrap: wrap; }
  .card-name { font-size: 0.95rem; font-weight: 700; }
  .card-type { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .status-badge { font-family: 'Space Mono', monospace; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.18em 0.55em; border-radius: 4px; white-space: nowrap; }
  .good  .status-badge { background: rgba(34,197,94,0.15); color: var(--good); }
  .minor .status-badge { background: rgba(245,158,11,0.15); color: var(--warn); }
  .bad   .status-badge { background: rgba(239,68,68,0.15); color: var(--bad); }
  .card-reason { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-top: 0.1rem; }
  .meta { margin-top: 1rem; font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); text-align: right; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 1.5rem 1rem; color: var(--muted); font-size: 0.88rem; }
  .in-window { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 4px; vertical-align: middle; }
  .notif-alert { background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3); border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 1rem; font-size: 0.82rem; line-height: 1.5; color: var(--text); display: none; }
  .notif-alert.show { display: block; }
  .notif-alert strong { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">TfL Live Status</div>
    <h1>My Commute</h1>
  </header>
  <div id="notifAlert" class="notif-alert"></div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('lines', this)">🚇 Lines</button>
    <button class="tab" onclick="switchTab('stations', this)">📍 Stations</button>
    <button class="tab" onclick="switchTab('times', this)">⏰ Times</button>
  </div>
  <div id="panel-lines" class="panel active">
    <div class="section-card">
      <h2>Select your lines</h2>
      <div class="line-grid" id="lineGrid"></div>
    </div>
  </div>
  <div id="panel-stations" class="panel">
    <div class="section-card">
      <h2>Search stations</h2>
      <div class="search-row">
        <input type="text" id="stationSearch" class="search-input" placeholder="e.g. Kings Cross, Vauxhall…" oninput="onStationSearch()" autocomplete="off">
      </div>
      <div id="searchResults" class="search-results"></div>
      <h2 style="margin-top:0.4rem">Saved stations</h2>
      <div id="savedStations" class="saved-stations"><div class="empty-stations">No stations saved yet</div></div>
    </div>
  </div>
  <div id="panel-times" class="panel">
    <div class="section-card">
      <h2>Alert windows</h2>
      <div class="time-windows" id="timeWindows"></div>
      <button class="add-time-btn" onclick="addTimeWindow()">＋ Add time window</button>
    </div>
    <div class="section-card">
      <h2>Notifications</h2>
      <div class="notif-row">
        <span>Enable alerts</span>
        <label class="toggle"><input type="checkbox" id="notifToggle" onchange="toggleNotifications()"><span class="toggle-slider"></span></label>
      </div>
      <p class="notif-note">When enabled, the app will check your saved lines and stations during your alert windows and notify you of any disruptions. Keep this page open.</p>
    </div>
  </div>
  <button class="check-btn" id="checkBtn" onclick="checkStatus()">Check My Commute Now</button>
  <div id="resultsSection" class="results-section" style="display:none">
    <div class="results-header" id="resultsHeader"></div>
    <div id="results" class="results"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>

let selectedLines = new Set();
let savedStations = [];
let timeWindows = [];
let notifEnabled = false;
let notifInterval = null;

function save() {
  try {
    localStorage.setItem('mc_lines', JSON.stringify([...selectedLines]));
    localStorage.setItem('mc_stations', JSON.stringify(savedStations));
    localStorage.setItem('mc_times', JSON.stringify(timeWindows));
    localStorage.setItem('mc_notif', notifEnabled ? '1' : '0');
  } catch(e) {}
}
function load() {
  try {
    const l = localStorage.getItem('mc_lines');
    if (l) JSON.parse(l).forEach(x => selectedLines.add(x));
    const s = localStorage.getItem('mc_stations');
    if (s) savedStations = JSON.parse(s);
    const t = localStorage.getItem('mc_times');
    if (t) timeWindows = JSON.parse(t);
    const n = localStorage.getItem('mc_notif');
    if (n) notifEnabled = n === '1';
  } catch(e) {}
}
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

  LINES.forEach(line => {
    const btn = document.createElement('button');
    btn.className = 'line-btn' + (selectedLines.has(line.id) ? ' selected' : '');
    btn.style.setProperty('--line-color', line.color);
    btn.innerHTML = `<span class="line-dot" style="background:${line.color}"></span>${line.name}`;
    btn.onclick = () => { toggleLine(line.id, btn); };
    grid.appendChild(btn);
  });
}
function toggleLine(id, btn) {
  if (selectedLines.has(id)) { selectedLines.delete(id); btn.classList.remove('selected'); }
  else { selectedLines.add(id); btn.classList.add('selected'); }
  save();
}
function onStationSearch() {
  const q = document.getElementById('stationSearch').value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if (q.length < 2) { box.classList.remove('show'); box.innerHTML = ''; return; }
  const matches = ALL_STATIONS.filter(s => s.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { box.innerHTML = '<div class="search-result-item" style="color:var(--muted)">No stations found</div>'; box.classList.add('show'); return; }
  box.innerHTML = matches.map(s => `<div class="search-result-item" onclick="addStation('${s.id}','${s.name.replace(/'/g,"\\'")}','${s.lines.join(",")}')"><div>${s.name}</div><div class="result-line">${s.lines.join(' · ')}</div></div>`).join('');
  box.classList.add('show');
}
function addStation(id, name, linesStr) {
  if (savedStations.find(s => s.id === id)) { closeSearch(); return; }
  savedStations.push({ id, name, lines: linesStr.split(',') });
  save(); renderSavedStations(); closeSearch();
}
function closeSearch() {
  document.getElementById('stationSearch').value = '';
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('searchResults').innerHTML = '';
}
function removeStation(id) {
  savedStations = savedStations.filter(s => s.id !== id);
  save(); renderSavedStations();
}
function renderSavedStations() {
  const el = document.getElementById('savedStations');
  if (!savedStations.length) { el.innerHTML = '<div class="empty-stations">No stations saved yet — search above</div>'; return; }
  el.innerHTML = savedStations.map(s => `<div class="saved-station"><div><div class="saved-station-name">${s.name}</div><div class="saved-station-lines">${s.lines.join(' · ')}</div></div><button class="remove-btn" onclick="removeStation('${s.id}')">×</button></div>`).join('');
}
function addTimeWindow(fw) {
  const w = fw || { fromH: 7, fromM: 0, toH: 9, toM: 30 };
  timeWindows.push(w);
  save(); renderTimeWindows();
}
function removeTimeWindow(i) {
  timeWindows.splice(i, 1);
  save(); renderTimeWindows();
}
function renderTimeWindows() {
  const el = document.getElementById('timeWindows');
  if (!timeWindows.length) { el.innerHTML = ''; return; }
  el.innerHTML = timeWindows.map((w, i) => `<div class="time-window-row"><span class="time-label">from</span><div class="time-picker">${makeHSelect(w.fromH, i, 'fromH')}<span class="time-sep">:</span>${makeMSelect(w.fromM, i, 'fromM')}</div><span class="time-arrow">→</span><div class="time-picker">${makeHSelect(w.toH, i, 'toH')}<span class="time-sep">:</span>${makeMSelect(w.toM, i, 'toM')}</div>${timeWindows.length > 1 ? `<button class="remove-time-btn" onclick="removeTimeWindow(${i})">×</button>` : ''}</div>`).join('');
}
function makeHSelect(val, idx, field) {
  let o = '';
  for (let h=0;h<=23;h++) o+=`<option value="${h}" ${h==val?'selected':''}>${String(h).padStart(2,'0')}</option>`;
  return `<select onchange="updateTW(${idx},'${field}',this.value)">${o}</select>`;
}
function makeMSelect(val, idx, field) {
  let o = '';
  for (let m=0;m<=55;m+=5) o+=`<option value="${m}" ${m==val?'selected':''}>${String(m).padStart(2,'0')}</option>`;
  return `<select onchange="updateTW(${idx},'${field}',this.value)">${o}</select>`;
}
function updateTW(idx, field, val) { timeWindows[idx][field] = parseInt(val); save(); }
function toggleNotifications() {
  notifEnabled = document.getElementById('notifToggle').checked;
  save();
  if (notifEnabled) {
    if ('Notification' in window && Notification.permission !== 'granted') {
      Notification.requestPermission().then(p => {
        if (p !== 'granted') { showNotifAlert('⚠️ Notifications blocked. You can still use the manual check button.'); }
        else { showNotifAlert('✅ <strong>Alerts enabled!</strong> Keep this page open. The app will check during your time windows.'); startPolling(); }
      });
    } else {
      showNotifAlert('✅ <strong>Alerts enabled!</strong> Keep this page open. The app will check during your time windows.');
      startPolling();
    }
  } else {
    stopPolling();
    document.getElementById('notifAlert').classList.remove('show');
  }
}
function showNotifAlert(msg) {
  const el = document.getElementById('notifAlert');
  el.innerHTML = msg; el.classList.add('show');
}
function isInWindow() {
  if (!timeWindows.length) return false;
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  return timeWindows.some(w => nowMins >= (w.fromH*60+w.fromM) && nowMins <= (w.toH*60+w.toM));
}
function startPolling() {
  stopPolling();
  notifInterval = setInterval(async () => { if (!isInWindow()) return; await checkStatus(true); }, 5*60*1000);
}
function stopPolling() { if (notifInterval) clearInterval(notifInterval); notifInterval = null; }
function severityClass(desc) {
  if (!desc) return 'good';
  const d = desc.toLowerCase();
  if (d.includes('good service') || d.includes('special service')) return 'good';
  if (d.includes('minor delay') || d.includes('reduced service') || d.includes('part suspension') || d.includes('part closure') || d.includes('planned closure')) return 'minor';
  return 'bad';
}
async function checkStatus(silent = false) {
  const hasLines = selectedLines.size > 0;
  const hasStations = savedStations.length > 0;
  if (!hasLines && !hasStations) { if (!silent) alert('Please select at least one line or save at least one station first.'); return; }
  const btn = document.getElementById('checkBtn');
  if (!silent) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Checking…'; }
  const resultsEl = document.getElementById('results');
  const section = document.getElementById('resultsSection');
  if (!silent) { resultsEl.innerHTML = ''; section.style.display = 'none'; }
  const allResults = [];
  const inWindow = isInWindow();
  try {
    if (hasLines) {
      const ids = [...selectedLines].join(',');
      const res = await fetch(`https://api.tfl.gov.uk/Line/${encodeURIComponent(ids)}/Status`);
      if (res.ok) {
        const data = await res.json();
        data.forEach(line => {
          const lineInfo = LINES.find(l => l.id === line.id) || {};
          const statusObj = line.lineStatuses?.[0] || {};
          const statusText = statusObj.statusSeverityDescription || 'Unknown';
          const reason = (statusObj.reason || '').replace(/^[^:]+:\s*/i, '');
          allResults.push({ name: line.name, type: 'line', color: lineInfo.color || '#888', statusText, reason, cls: severityClass(statusText) });
        });
      }
    }
    if (hasStations) {
      for (const station of savedStations) {
        try {
          const res = await fetch(`https://api.tfl.gov.uk/StopPoint/${station.id}/Disruption`);
          if (res.ok) {
            const data = await res.json();
            if (data.length > 0) {
              const desc = data[0].description || data[0].categoryDescription || 'Disruption reported';
              allResults.push({ name: station.name, type: 'station', color: '#7c6af7', statusText: data[0].categoryDescription || 'Disruption', reason: desc, cls: 'bad' });
            } else {
              allResults.push({ name: station.name, type: 'station', color: '#7c6af7', statusText: 'No disruptions', reason: '', cls: 'good' });
            }
          }
        } catch(e) {
          allResults.push({ name: station.name, type: 'station', color: '#7c6af7', statusText: 'Check failed', reason: '', cls: 'minor' });
        }
      }
    }
    if (silent && notifEnabled && inWindow) {
      const problems = allResults.filter(r => r.cls !== 'good');
      if (problems.length && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('⚠️ Commute Alert', { body: problems.map(p => `${p.name}: ${p.statusText}`).join('\n') });
      }
      return;
    }
    if (!silent) {
      const container = document.createElement('div');
      container.className = 'results';
      allResults.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = `status-card ${r.cls}`;
        card.style.animationDelay = `${i * 0.05}s`;
        card.innerHTML = `<div class="card-bar" style="background:${r.color}"></div><div class="card-body"><div class="card-header"><div><div class="card-name">${r.name}${inWindow ? '<span class="in-window"></span>' : ''}</div><div class="card-type">${r.type}</div></div><span class="status-badge">${r.statusText}</span></div>${r.reason ? `<div class="card-reason">${r.reason}</div>` : ''}</div>`;
        container.appendChild(card);
      });
      resultsEl.innerHTML = '';
      resultsEl.appendChild(container);
      document.getElementById('resultsHeader').textContent = `${allResults.length} result${allResults.length !== 1 ? 's' : ''}`;
      document.getElementById('meta').textContent = `Last checked ${new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})} · Live TfL data`;
      section.style.display = 'block';
    }
  } catch(err) {
    if (!silent) {
      resultsEl.innerHTML = `<div class="empty-state">⚠️ Couldn't reach TfL API.<br><small style="font-size:0.72rem">${err.message}</small></div>`;
      section.style.display = 'block';
    }
  } finally {
    if (!silent) { btn.disabled = false; btn.textContent = 'Check My Commute Now'; }
  }
}
load();
buildLineGrid();
renderSavedStations();
if (!timeWindows.length) addTimeWindow({ fromH: 7, fromM: 0, toH: 9, toM: 30 });
else renderTimeWindows();
document.getElementById('notifToggle').checked = notifEnabled;
if (notifEnabled) startPolling();
</script>
